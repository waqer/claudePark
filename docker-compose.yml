version: "3.9"

services:

  # ── MySQL Database ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: parkman
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: parkman
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── PHP Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parkman_backend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: parkman
      DB_USER: root
      DB_PASS: secret
      API_BASE_URL: http://localhost:8080/api

  # ── Database setup (runs once then exits) ─────────────────────────────────
  setup:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parkman_setup
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: parkman
      DB_USER: root
      DB_PASS: secret
    command: bash -c "php backend/migrate.php && php backend/seed.php"
    restart: "no"

  # ── Vue 3 Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: parkman_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
